name: Auto Crawler

on:
  schedule:
    # 한국 시간 기준 매시간 정각마다 실행되도록 설정 (UTC 0분)
    - cron: '0 * * * *'
  workflow_dispatch: # 깃허브 홈페이지에서 수동으로 버튼을 눌러서 실행할 수 있게 해주는 옵션

permissions:
  contents: write # 깃허브 봇이 업데이트된 데이터를 다시 깃허브에 쓸 수 있도록 권한 부여

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 내 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Node.js 환경 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3. 필요한 패키지 설치 (Puppeteer 등)
        run: npm install

      - name: 4. 크롤러 스크립트 실행
        run: node crawler.js

      - name: 5. 새로 수집된 데이터를 깃허브에 저장(Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/aion2_legion_data.json
          git commit -m "🤖 자동 업데이트: 레기온 크롤링 데이터 갱신" || echo "변경사항 없음"
          git push