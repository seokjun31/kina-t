name: Auto Crawler

on:
  schedule:
    # 한국 시간 기준 매시간 정각마다 실행 (UTC 기준)
    - cron: '0 * * * *'
  workflow_dispatch: # GitHub 웹에서 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Node.js 환경 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3. 패키지 설치
        run: npm install

      - name: 4. 크롤러 실행 (Firebase 직접 저장)
        run: node crawler.js
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}

      - name: 5. JSON 파일 변경사항 커밋 & 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/aion2_legion_data.json
          git commit -m "🤖 자동 업데이트: 레기온 크롤링 데이터 갱신" || echo "변경사항 없음"
          git push
